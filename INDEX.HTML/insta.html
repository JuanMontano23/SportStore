<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PEAK • Instagram</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        body { font-family: 'Inter', system-ui, sans-serif; }
        .instagram-bg { background: linear-gradient(135deg, #1a1a1a, #111827); }
        .post-img {
            aspect-ratio: 1 / 1;
            object-fit: cover;
        }
    </style>
</head>
<body class="bg-black text-white instagram-bg min-h-screen">

    <!-- Navbar Instagram -->
    <nav class="bg-zinc-950 border-b border-zinc-800 fixed w-full z-50">
        <div class="max-w-3xl mx-auto px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-4">
                <i class="fa-brands fa-instagram text-3xl"></i>
                <span class="text-2xl font-bold tracking-tighter">PEAK</span>
            </div>
            <div class="flex items-center gap-5 text-xl">
                <i class="fa-solid fa-house"></i>
                <i class="fa-regular fa-compass"></i>
                <i class="fa-regular fa-heart"></i>
                <i class="fa-regular fa-paper-plane"></i>
                <div class="w-8 h-8 bg-emerald-500 rounded-full overflow-hidden border-2 border-white">
                    <img src="https://via.placeholder.com/150" alt="Perfil" class="w-full h-full object-cover">
                </div>
            </div>
        </div>
    </nav>

    <div class="max-w-3xl mx-auto pt-20 pb-12">

        <!-- Perfil Header -->
        <div class="px-4 pt-6">
            <div class="flex items-center gap-6">
                <!-- Foto de perfil -->
                <div class="w-24 h-24 rounded-full overflow-hidden border-4 border-white/80 flex-shrink-0">
                    <img src="https://via.placeholder.com/300" alt="PEAK" class="w-full h-full object-cover">
                </div>

                <div class="flex-1">
                    <div class="flex items-center gap-3">
                        <h1 class="text-3xl font-bold">peakperformance</h1>
                        <span class="bg-blue-600 text-white text-xs px-3 py-1 rounded-full font-medium">✓</span>
                    </div>
                    <p class="text-emerald-400 font-semibold mt-1">PEAK Performance</p>
                    
                    <div class="flex gap-8 mt-6 text-center">
                        <div>
                            <p class="font-bold text-lg">248</p>
                            <p class="text-xs text-zinc-400">Publicaciones</p>
                        </div>
                        <div>
                            <p class="font-bold text-lg">12.4k</p>
                            <p class="text-xs text-zinc-400">Seguidores</p>
                        </div>
                        <div>
                            <p class="font-bold text-lg">892</p>
                            <p class="text-xs text-zinc-400">Siguiendo</p>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Bio -->
            <div class="mt-6 text-sm">
                <p><strong>Muévete sin límites</strong></p>
                <p class="text-zinc-400">Ropa técnica • Training • Lifestyle</p>
                <p class="text-emerald-400">🌍 Colombia • Temporada 2024</p>
            </div>

            <!-- Botones -->
            <div class="flex gap-3 mt-6">
                <button class="flex-1 bg-white text-black font-semibold py-2 rounded-xl">Editar perfil</button>
                <button class="flex-1 bg-zinc-800 font-semibold py-2 rounded-xl">Compartir perfil</button>
            </div>
        </div>

        <!-- Highlight Stories -->
        <div class="flex gap-6 px-4 mt-8 overflow-x-auto pb-4">
            <div class="text-center flex-shrink-0">
                <div class="w-16 h-16 rounded-full bg-gradient-to-tr from-pink-500 via-red-500 to-yellow-500 p-0.5">
                    <div class="w-full h-full rounded-full bg-black p-0.5">
                        <div class="w-full h-full rounded-full bg-zinc-900 flex items-center justify-center text-2xl">🏔️</div>
                    </div>
                </div>
                <p class="text-xs mt-1">Training</p>
            </div>
            <!-- Repite más highlights si quieres -->
        </div>


    <!-- Bottom Navigation (Mobile Instagram Style) -->
    <div class="fixed bottom-0 left-0 right-0 bg-zinc-950 border-t border-zinc-800 max-w-3xl mx-auto">
        <div class="flex justify-around items-center py-3 text-2xl">
            <i class="fa-solid fa-house text-white"></i>
            <i class="fa-regular fa-compass text-zinc-400"></i>
            <i class="fa-solid fa-square-plus text-zinc-400"></i>
            <i class="fa-regular fa-heart text-zinc-400"></i>
            <i class="fa-regular fa-user text-emerald-400"></i>
        </div>
    </div>
</body>
</html>
